name: 🤖 Weekly SEO Competitor Analysis

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:     # Allow manual trigger

# ✅ Opt into Node.js 24 now to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5  # ✅ Updated to v5 (Node.js 24 compatible)

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5  # ✅ v5 already supports Node.js 24
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧠 Run Competitor AI Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent.py

      - name: 💾 Commit & push results
        uses: stefanzweifel/git-auto-commit-action@v5  # ✅ Already compatible
        with:
          commit_message: "🤖 Auto-update: competitor analysis ${{ github.run_number }}"
          file_pattern: "reports/*.md state/*.json"
          commit_user_name: "Competitor AI Bot"
          commit_user_email: "bot@competitor-ai.local"
